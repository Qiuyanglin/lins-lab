{{/* Custom publication view */}}
{{ $p := .item }}

<div class="mb-4">
  <div class="font-semibold">
    <a href="{{ $p.RelPermalink }}">{{ $p.Title }}</a>
  </div>

  {{ with $p.Params.authors }}
  <div class="text-sm">
    {{ delimit . ", " }}
  </div>
  {{ end }}

  {{ with $p.Params.publication_short }}
  <div class="text-sm">
    {{ . }}
  </div>
  {{ else }}
  {{ with $p.Params.publication }}
  <div class="text-sm">
    {{ . | markdownify }}
  </div>
  {{ end }}
  {{ end }}
</div>
